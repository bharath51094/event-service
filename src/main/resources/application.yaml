spring:
  application:
    name: event-service
  datasource:
    url: jdbc:h2:mem:eventdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080
account-service:
  base-url: http://localhost:8081
  # Shared secret presented to the internal Account Service on every call (matches its internal.api-key).
  api-key: local-internal-api-key
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,metrics,prometheus,eventoutcomes
      discovery:
        enabled: false
  endpoint:
    health:
      show-details: always
resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.ledger.eventservice.exception.AccountServiceUnavailableException
        ignore-exceptions:
          - com.ledger.eventservice.exception.AccountServiceRejectedException
logging:
  structured:
    format:
      console: ecs
  level:
    com.ledger: INFO
